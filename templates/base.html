<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ meta_description | default('Arun Advani') }}" />
    <meta name="author" content="Arun Advani" />

    <title>{{ page_title | default('Arun Advani') }}</title>

    <!-- Bootstrap core CSS -->
    <link href="bootstrap/css/bootstrap.css" rel="stylesheet" />

    <!-- Custom styles for this template -->
    <link href="styles/aa.css" rel="stylesheet" />

    <!-- Javascript for altmetric badge -->
    <script
      type="text/javascript"
      src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"
    ></script>

    {% block extra_head %}{% endblock %}
  </head>

  <body>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
      <div class="container">
        <div class="">
          <ul class="nav navbar-nav">

            <li{% if active_page == 'home' %} class="active"{% endif %}>
              <a class="navbar-brand" href="index.html"> Home </a>
            </li>

            <li class="nav-item{% if active_page in ['research', 'researchbytopic'] %} active{% endif %} dropdown">
              <a
                class="nav-link dropdown-toggle"
                data-toggle="dropdown"
                role="button"
                aria-haspopup="true"
                aria-expanded="false"
                >Research</a
              >
              <div class="dropdown-menu">
                <a class="dropdown-item" href="research.html">
                  Academic Research
                </a>
                <a class="dropdown-item" href="researchbytopic.html">
                  Research by Topic
                </a>
              </div>
            </li>

            <li{% if active_page == 'policy' %} class="active"{% endif %}>
              <a href="policy.html"> Policy </a>
            </li>

            <li{% if active_page == 'taxreform' %} class="active"{% endif %}>
              <a href="taxreform.html"> Tax Simulator </a>
            </li>

            <li> <a href="ArunAdvani_CV.pdf"> CV </a> </li>

            <li> <a href="http://centax.org.uk"> CenTax </a> </li>

            <li> <a href="http://www.discovereconomics.co.uk"> #DiscoverEconomics </a> </li>

            <li> <a href="http://www.wealthtaxcommission.uk"> Wealth Tax Commission </a> </li>

          </ul>
        </div><!--/.nav-collapse -->
      </div>
    </div>

    <div class="container">
      <div class="row">
        <a href="https://centax.org.uk"><img class="warwicklogo" src="CenTax_Warwick_logo.png" /></a>
      </div>
    </div>

    {% block content %}{% endblock %}

    <script src="bootstrap/js/jquery.js"></script>
    <script src="bootstrap/js/popper.min.js"></script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
  </body>
</html>
